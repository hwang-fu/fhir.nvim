name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lua lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: stylua (format check)
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua tests

      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"

      - uses: leafo/gh-actions-luarocks@v4

      - name: Install luacheck
        run: luarocks install luacheck

      - name: luacheck
        run: luacheck lua

  test:
    name: Tests (nvim ${{ matrix.nvim }})
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim: ["v0.10.0", "stable"]
    steps:
      - uses: actions/checkout@v6

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim }}

      - name: Install the json Treesitter parser
        run: |
          git clone --depth 1 -b master https://github.com/nvim-treesitter/nvim-treesitter .tests/nvim-treesitter
          nvim --headless --cmd "set rtp+=.tests/nvim-treesitter" -c "TSInstallSync json" -c "qa"

      - name: Run tests
        run: make test

  rust:
    name: Rust tests
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo build (native module)
        run: cargo build -p fhir-core-lua

      - name: cargo test
        run: cargo test -p fhir-core -p fhir-schema-gen

      - name: cargo clippy
        run: cargo clippy -p fhir-core -- -D warnings
